<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WBC Pool C Tracker</title>

<style>

body{
font-family:Arial;
margin:20px;
}

.container{
display:flex;
gap:40px;
flex-wrap:wrap;
}

table{
border-collapse:collapse;
width:100%;
max-width:520px;
}

th,td{
border:1px solid #bbb;
padding:8px;
text-align:center;
}

tr:nth-child(even){
background:#f3f6fb;
}

.score{
width:42px;
text-align:center;
font-size:16px;
}

.scorebox{
display:flex;
gap:6px;
justify-content:center;
}

h2{
margin-top:0;
}

/* mobile */

@media(max-width:700px){

.container{
flex-direction:column;
}

table{
font-size:15px;
}

.score{
width:50px;
font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

<div>

<h2>Pool C Games</h2>

<table id="games">

<tr>
<th>Date</th>
<th>Away</th>
<th>Score</th>
<th>Home</th>
</tr>

<tr><td>3/5</td><td>Taiwan</td><td class="scorebox"><input class="score" id="g1a"><input class="score" id="g1b"></td><td>Australia</td></tr>
<tr><td>3/5</td><td>Czech</td><td class="scorebox"><input class="score" id="g2a"><input class="score" id="g2b"></td><td>Korea</td></tr>
<tr><td>3/6</td><td>Australia</td><td class="scorebox"><input class="score" id="g3a"><input class="score" id="g3b"></td><td>Czech</td></tr>
<tr><td>3/6</td><td>Japan</td><td class="scorebox"><input class="score" id="g4a"><input class="score" id="g4b"></td><td>Taiwan</td></tr>
<tr><td>3/7</td><td>Taiwan</td><td class="scorebox"><input class="score" id="g5a"><input class="score" id="g5b"></td><td>Czech</td></tr>
<tr><td>3/7</td><td>Korea</td><td class="scorebox"><input class="score" id="g6a"><input class="score" id="g6b"></td><td>Japan</td></tr>
<tr><td>3/8</td><td>Taiwan</td><td class="scorebox"><input class="score" id="g7a"><input class="score" id="g7b"></td><td>Korea</td></tr>
<tr><td>3/8</td><td>Australia</td><td class="scorebox"><input class="score" id="g8a"><input class="score" id="g8b"></td><td>Japan</td></tr>
<tr><td>3/9</td><td>Korea</td><td class="scorebox"><input class="score" id="g9a"><input class="score" id="g9b"></td><td>Australia</td></tr>
<tr><td>3/9</td><td>Czech</td><td class="scorebox"><input class="score" id="g10a"><input class="score" id="g10b"></td><td>Japan</td></tr>

</table>

</div>


<div>

<h2>Standings</h2>

<table id="standings">
<tr>
<th>Team</th>
<th>G</th>
<th>W</th>
<th>L</th>
<th>RA</th>
<th>Win%</th>
</tr>
</table>

</div>

</div>


<script>

const teams=["Taiwan","Australia","Czech","Korea","Japan"]

const games=[
["Taiwan","Australia","g1a","g1b"],
["Czech","Korea","g2a","g2b"],
["Australia","Czech","g3a","g3b"],
["Japan","Taiwan","g4a","g4b"],
["Taiwan","Czech","g5a","g5b"],
["Korea","Japan","g6a","g6b"],
["Taiwan","Korea","g7a","g7b"],
["Australia","Japan","g8a","g8b"],
["Korea","Australia","g9a","g9b"],
["Czech","Japan","g10a","g10b"]
]

function save(){

let data={}

document.querySelectorAll(".score").forEach(i=>{
data[i.id]=i.value
})

localStorage.setItem("wbc_scores",JSON.stringify(data))

}

function load(){

let data=JSON.parse(localStorage.getItem("wbc_scores"))

if(!data)return

for(let k in data){

if(document.getElementById(k))
document.getElementById(k).value=data[k]

}

}

function calculate(){

let stats={}
let h2h={}

teams.forEach(t=>{
stats[t]={g:0,w:0,l:0,ra:0}
h2h[t]={}
})

games.forEach(g=>{

let s1=parseInt(document.getElementById(g[2]).value)
let s2=parseInt(document.getElementById(g[3]).value)

if(isNaN(s1)||isNaN(s2))return

let t1=g[0]
let t2=g[1]

stats[t1].g++
stats[t2].g++

stats[t1].ra+=s2
stats[t2].ra+=s1

if(!h2h[t1][t2])h2h[t1][t2]={w:0,l:0,ra:0}
if(!h2h[t2][t1])h2h[t2][t1]={w:0,l:0,ra:0}

h2h[t1][t2].ra+=s2
h2h[t2][t1].ra+=s1

if(s1>s2){
stats[t1].w++
stats[t2].l++
h2h[t1][t2].w++
h2h[t2][t1].l++
}else{
stats[t2].w++
stats[t1].l++
h2h[t2][t1].w++
h2h[t1][t2].l++
}

})

let arr=teams.map(t=>{
let s=stats[t]
let pct=s.g? s.w/s.g:0
return {team:t,...s,pct}
})

arr.sort((a,b)=>{

// 1 勝場
if(b.w!==a.w) return b.w-a.w

// 找同勝場隊伍
let same = arr.filter(t=>t.w===a.w)

// 2 只有兩隊同勝場 → 比對戰
if(same.length===2){

let a_vs_b=h2h[a.team]?.[b.team]
let b_vs_a=h2h[b.team]?.[a.team]

if(a_vs_b && b_vs_a){

if(a_vs_b.w>b_vs_a.w) return -1
if(b_vs_a.w>a_vs_b.w) return 1

}

}

// 3 三隊以上 → 比失分
return a.ra-b.ra

})

let table=document.getElementById("standings")

table.innerHTML=`
<tr>
<th>Team</th>
<th>G</th>
<th>W</th>
<th>L</th>
<th>RA</th>
<th>Win%</th>
</tr>
`

arr.forEach(t=>{

table.innerHTML+=`
<tr>
<td>${t.team}</td>
<td>${t.g}</td>
<td>${t.w}</td>
<td>${t.l}</td>
<td>${t.ra}</td>
<td>${t.pct.toFixed(3)}</td>
</tr>
`

})

}

document.querySelectorAll(".score").forEach(i=>{
i.addEventListener("input",()=>{
save()
calculate()
})
})

load()
calculate()

</script>

</body>
</html>
